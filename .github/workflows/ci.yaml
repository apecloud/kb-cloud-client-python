name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Type check
        run: mypy src/kb_cloud_client/ --ignore-missing-imports
        continue-on-error: true   # generated code may have type issues

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Check formatting
        run: ruff format --check src/kb_cloud_client/*.py tests/ examples/

      - name: Lint
        run: ruff check src/kb_cloud_client/*.py tests/ examples/

  build:
    name: Build package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          pip install build twine
          python -m build --sdist --wheel --outdir dist/
          twine check dist/*

  generate:
    name: Verify generator output is up-to-date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run generator
        run: bash generate.sh

      - name: Check for uncommitted changes in generated code
        run: |
          git diff --exit-code src/kb_cloud_client/kbcloud/ || \
            (echo "Generated code is out of date. Run ./generate.sh and commit." && exit 1)
